name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build the SVN-ready zip as an artifact without pushing to wp.org'
        type: boolean
        default: true

# Granted to the reusable workflow's release job (it creates the GitHub release).
# A reusable workflow cannot exceed the caller's GITHUB_TOKEN permissions.
permissions:
  contents: write

jobs:
  release:
    uses: wppoland/workflows/.github/workflows/_release-free.yml@v1
    with:
      slug: restock
      wporg-slug: restock
      has-js: false
      dry-run: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry-run) || false }}
    secrets:
      WPORG_SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
      WPORG_SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
